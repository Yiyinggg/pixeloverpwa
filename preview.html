<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>预览 · 主页</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.phone{width:390px;height:772px;position:relative;overflow:hidden;background:#1a1a1a}
.bg{position:absolute;inset:0;z-index:0;overflow:hidden}
.bg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0}
.bg img.on{opacity:1;z-index:1;animation:kb 20s ease-in-out infinite alternate}
@keyframes kb{0%{transform:scale(1) translate(0,0)}100%{transform:scale(1.08) translate(-1%,-1%)}}
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
.px-cal-wrap{position:absolute;top:12px;left:12px;z-index:15}
.px-cal{width:88px;border:4px solid #0a0500;background:#fff;overflow:hidden;image-rendering:pixelated;box-shadow:4px 4px 0 rgba(0,0,0,.5)}
.px-cal-rings{display:flex;justify-content:space-around;padding:4px 6px 2px;background:linear-gradient(180deg,#7b5cb0 0%,#5a3d8a 100%);border-bottom:3px solid #3a2050}
.px-cal-rings span{width:12px;height:10px;background:#f5c842;border:2px solid #0a0500;border-radius:50%;box-shadow:1px 1px 0 rgba(0,0,0,.5)}
.px-cal-head{background:linear-gradient(180deg,#8a6bb8 0%,#6b4c9a 50%,#4a3070 100%);padding:6px 4px 8px;text-align:center;border-bottom:2px solid #0a0500}
.px-cal-head span{font-family:'Press Start 2P',monospace;font-size:10px;color:#f5c842;text-shadow:2px 2px 0 #8a5a20,1px 1px 0 #0a0500;letter-spacing:1px}
.px-cal-body{position:relative;min-height:70px;display:flex;align-items:center;justify-content:center;background:#f5f0e8;border:2px solid #d0c8b8}
.px-cal-day{font-family:'Press Start 2P',monospace;font-size:28px;color:#6b4c9a;text-shadow:2px 2px 0 #0a0500,1px 1px 0 #0a0500,-1px -1px 0 #0a0500;line-height:1}
.px-cal-curl{position:absolute;bottom:0;right:0;width:0;height:0;border-style:solid;border-width:0 0 22px 22px;border-color:transparent transparent #8a8078 transparent;filter:drop-shadow(1px 1px 2px rgba(0,0,0,.4))}
.btns{position:absolute;bottom:20px;left:12px;right:12px;display:flex;justify-content:center;gap:10px;z-index:10}
.btns button{font-size:16px;padding:14px 18px;background:rgba(45,30,18,.95);color:#f5deb3;border:3px solid #1a0a00;cursor:pointer}
.btns button.on{background:#f5c842;color:#1a0a00}
.badge{position:absolute;top:10px;right:10px;background:#2a6a2a;color:#fff;padding:10px 14px;font-size:14px;z-index:999;border-radius:6px;pointer-events:none}
</style>
</head>
<body>
<div class="phone">
  <div class="badge">✓ 预览页 · 无缓存</div>
  <div class="bg" id="bg">
    <img class="on" src="images/home1.png" alt="">
    <img src="images/home2.png" alt="">
    <img src="images/home3.png" alt="">
    <img src="images/home4.png" alt="">
  </div>
  <div class="px-cal-wrap">
    <div class="px-cal">
      <div class="px-cal-rings"><span></span><span></span><span></span><span></span></div>
      <div class="px-cal-head"><span id="m">—</span></div>
      <div class="px-cal-body">
        <span class="px-cal-day" id="d">—</span>
        <div class="px-cal-curl" aria-hidden="true"></div>
      </div>
    </div>
  </div>
  <div class="btns">
    <button class="on" onclick="set(1)">HOME 1</button>
    <button onclick="set(2)">HOME 2</button>
    <button onclick="set(3)">HOME 3</button>
    <button onclick="set(4)">HOME 4</button>
  </div>
</div>
<script>
var M=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
function render(){
  var n=new Date();
  var elM=document.getElementById('m'),elD=document.getElementById('d');
  if(elM)elM.textContent=M[n.getMonth()];
  if(elD)elD.textContent=String(n.getDate());
}
function set(n){
  document.querySelectorAll('#bg img').forEach(function(img,i){img.classList.toggle('on',i===n-1)});
  document.querySelectorAll('.btns button').forEach(function(b,i){b.classList.toggle('on',i===n-1)});
}
render();
</script>
</body>
</html>
