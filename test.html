<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>图片测试</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #333; color: #fff; }
.box { width: 300px; height: 300px; margin: 20px 0; border: 4px solid #f5c842; background: #1a1a1a no-repeat center/cover; }
.status { padding: 12px; margin-top: 20px; border-radius: 4px; }
.ok { background: #2a6a2a; }
.fail { background: #8a2a2a; }
</style>
</head>
<body>
<h1>图片加载测试</h1>
<p>如果下面四张图都能显示，说明路径没问题。然后访问 <a href="/" style="color:#f5c842">主页</a>。</p>

<div class="box" id="b1" style="background-image:url('images/home1.png')">1</div>
<div class="box" id="b2" style="background-image:url('images/home2.png')">2</div>
<div class="box" id="b3" style="background-image:url('images/home3.png')">3</div>
<div class="box" id="b4" style="background-image:url('images/home4.png')">4</div>

<div id="status" class="status">检测中…</div>

<script>
(function() {
  var imgs = ['images/home1.png', 'images/home2.png', 'images/home3.png', 'images/home4.png'];
  var loaded = 0, failed = [];
  imgs.forEach(function(src, i) {
    var img = new Image();
    img.onload = function() { loaded++; done(); };
    img.onerror = function() { failed.push(src); done(); };
    img.src = src;
  });
  function done() {
    if (loaded + failed.length < imgs.length) return;
    var s = document.getElementById('status');
    if (failed.length === 0) {
      s.textContent = '✓ 全部 ' + loaded + ' 张图加载成功！';
      s.className = 'status ok';
    } else {
      s.textContent = '✗ 失败: ' + failed.join(', ');
      s.className = 'status fail';
    }
  }
})();
</script>
</body>
</html>
